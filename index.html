<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Taste Shape — Melomaniac Studios</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --lime: #b8f06e;
    --black: #0a0a0a;
    --dark: #111111;
    --mid: #1a1a1a;
    --text: #e0e0e0;
    --muted: #555;
  }
  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Inter', 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 2rem;
    padding: 2rem;
    text-align: center;
  }
  .logo {
    font-size: 0.75rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--lime);
    margin-bottom: 1rem;
  }
  #login-screen h1 {
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 700;
    line-height: 1.1;
    max-width: 600px;
  }
  #login-screen h1 span { color: var(--lime); }
  #login-screen p {
    color: var(--muted);
    font-size: 1rem;
    max-width: 400px;
    line-height: 1.6;
  }
  .btn-spotify {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--lime);
    color: var(--black);
    border: none;
    padding: 1rem 2rem;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s, opacity 0.2s;
    text-decoration: none;
    margin-top: 1rem;
  }
  .btn-spotify:hover { transform: scale(1.04); opacity: 0.9; }
  #app {
    display: none;
    flex-direction: column;
    min-height: 100vh;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 2rem;
    border-bottom: 1px solid #1e1e1e;
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(10px);
    z-index: 10;
  }
  .header-logo {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--lime);
  }
  .user-info {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .user-info img {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--lime);
  }
  #canvas-wrap {
    position: relative;
    width: 100%;
    height: 70vmin;
    max-height: 600px;
    min-height: 300px;
    background: radial-gradient(ellipse at center, #0f1a0a 0%, var(--black) 70%);
  }
  #threejs-canvas { width: 100%; height: 100%; display: block; }
  .canvas-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }
  .shape-label {
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--lime);
    opacity: 0.6;
  }
  .controls-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 1rem 2rem;
    flex-wrap: wrap;
  }
  .btn {
    background: var(--mid);
    color: var(--text);
    border: 1px solid #2a2a2a;
    padding: 0.6rem 1.25rem;
    border-radius: 50px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .btn:hover { border-color: var(--lime); color: var(--lime); }
  .btn.active { border-color: var(--lime); color: var(--lime); background: rgba(184,240,110,0.08); }
  .btn-share {
    background: var(--lime);
    color: var(--black);
    font-weight: 700;
    border-color: var(--lime);
  }
  .btn-share:hover { opacity: 0.85; color: var(--black); }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1px;
    background: #1a1a1a;
    margin: 0 2rem;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid #1e1e1e;
  }
  .stat-card { background: var(--dark); padding: 1.25rem; text-align: center; }
  .stat-value { font-size: 1.75rem; font-weight: 700; color: var(--lime); line-height: 1; }
  .stat-label { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-top: 0.4rem; }
  .section { padding: 2rem; }
  .section-title { font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.25rem; }
  .goals-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.75rem; }
  .goal-card {
    background: var(--mid);
    border: 1px solid #222;
    border-radius: 10px;
    padding: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .goal-card:hover, .goal-card.active { border-color: var(--lime); background: rgba(184,240,110,0.05); }
  .goal-canvas { width: 100%; height: 100px; border-radius: 6px; background: #0d0d0d; margin-bottom: 0.75rem; }
  .goal-name { font-size: 0.8rem; font-weight: 600; margin-bottom: 0.25rem; }
  .goal-desc { font-size: 0.7rem; color: var(--muted); }
  .history-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .history-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.75rem;
    background: var(--mid);
    border-radius: 8px;
    border: 1px solid #1e1e1e;
  }
  .history-item img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; }
  .history-track { font-size: 0.85rem; font-weight: 600; }
  .history-artist { font-size: 0.75rem; color: var(--muted); }
  .history-bar { margin-left: auto; display: flex; gap: 4px; align-items: flex-end; }
  .bar-seg { width: 4px; background: var(--lime); border-radius: 2px; opacity: 0.6; }
  #loading {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--black);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
  }
  .loading-ring {
    width: 48px;
    height: 48px;
    border: 2px solid #1e1e1e;
    border-top-color: var(--lime);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-text { font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--lime);
    color: var(--black);
    padding: 0.75rem 1.5rem;
    border-radius: 50px;
    font-size: 0.85rem;
    font-weight: 700;
    transition: transform 0.3s ease;
    z-index: 200;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

  <header>

      <img id="user-avatar" src="" alt="" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

const CLIENT_ID = '29c85914e40f4f36a6131e2f2ee803d4';
const REDIRECT_URI = window.location.origin + '/';
const SCOPES = 'user-top-read user-read-recently-played user-read-private';

function generateCodeVerifier(length = 128) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  let result = '';
  const randomValues = crypto.getRandomValues(new Uint8Array(length));
  randomValues.forEach(v => result += chars[v % chars.length]);
  return result;
}

async function generateCodeChallenge(verifier) {
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function login() {
  const verifier = generateCodeVerifier();
  const challenge = await generateCodeChallenge(verifier);
  sessionStorage.setItem('pkce_verifier', verifier);
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    response_type: 'code',
    redirect_uri: REDIRECT_URI,
    scope: SCOPES,
    code_challenge_method: 'S256',
    code_challenge: challenge,
  });
  window.location = 'https://accounts.spotify.com/authorize?' + params;
}

async function exchangeToken(code) {
  const verifier = sessionStorage.getItem('pkce_verifier');
  const body = new URLSearchParams({
    client_id: CLIENT_ID,
    grant_type: 'authorization_code',
    code,
    redirect_uri: REDIRECT_URI,
    code_verifier: verifier,
  });
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body,
  });
  const data = await res.json();
  if (data.access_token) {
    localStorage.setItem('spotify_token', data.access_token);
    localStorage.setItem('spotify_token_expiry', Date.now() + data.expires_in * 1000);
    window.history.replaceState({}, '', '/');
    return data.access_token;
  }
  throw new Error('Token exchange failed: ' + (data.error_description || data.error));
}

function getToken() {
  const token = localStorage.getItem('spotify_token');
  const expiry = localStorage.getItem('spotify_token_expiry');
  if (token && Date.now() < expiry) return token;
  return null;
}

async function spotifyFetch(endpoint, token) {
  const res = await fetch('https://api.spotify.com/v1' + endpoint, {
    headers: { Authorization: 'Bearer ' + token }
  });
  if (!res.ok) throw new Error('Spotify API error: ' + res.status);
  return res.json();
}

async function getArtistGenres(artistIds, token) {
  const unique = [...new Set(artistIds)];
  const chunks = [];
  for (let i = 0; i < unique.length; i += 50) chunks.push(unique.slice(i, i + 50));
  let all = [];
  for (const chunk of chunks) {
    const data = await spotifyFetch('/artists?ids=' + chunk.join(','), token);
    all = all.concat(data.artists.filter(Boolean));
  }
  return all;
}

function aggregateFromTracks(tracks, artists) {
  const genreCount = {};
  artists.forEach(a => {
    a.genres?.forEach(g => { genreCount[g] = (genreCount[g] || 0) + 1; });
  });
  const has = (keyword) => Object.keys(genreCount).some(g => g.includes(keyword));
  const energy = has('metal') || has('hardcore') || has('punk') ? 0.9 :
                 has('hip hop') || has('trap') || has('drill') ? 0.8 :
                 has('dance') || has('edm') || has('house') || has('techno') ? 0.85 :
                 has('rock') || has('indie rock') ? 0.7 :
                 has('pop') ? 0.6 :
                 has('r&b') || has('soul') ? 0.55 :
                 has('jazz') || has('classical') ? 0.3 :
                 has('ambient') || has('acoustic') ? 0.2 : 0.5;
  const valence = has('happy') || has('pop') || has('dance') ? 0.75 :
                  has('sad') || has('emo') || has('doom') ? 0.2 :
                  has('hip hop') || has('trap') ? 0.55 :
                  has('metal') || has('dark') ? 0.25 :
                  has('jazz') || has('soul') ? 0.6 : 0.5;
  const danceability = has('dance') || has('edm') || has('house') || has('techno') ? 0.9 :
                       has('hip hop') || has('trap') || has('r&b') ? 0.8 :
                       has('pop') ? 0.65 :
                       has('rock') || has('metal') ? 0.4 :
                       has('classical') || has('ambient') ? 0.2 : 0.5;
  const acousticness = has('acoustic') || has('folk') || has('classical') || has('jazz') ? 0.8 :
                       has('ambient') ? 0.5 :
                       has('pop') || has('r&b') ? 0.3 :
                       has('electronic') || has('edm') || has('house') ? 0.05 :
                       has('metal') || has('rock') ? 0.1 : 0.3;
  const instrumentalness = has('classical') || has('ambient') || has('jazz') ? 0.7 :
                            has('electronic') || has('edm') ? 0.5 :
                            has('hip hop') || has('pop') || has('r&b') ? 0.05 : 0.2;
  const avgPop = tracks.reduce((s, t) => s + (t.popularity || 50), 0) / tracks.length;
  const tempo_n = Math.min(1, avgPop / 100);
  const loudness_n = energy * 0.9;
  return { energy, valence, danceability, acousticness, instrumentalness, speechiness: 0.1, tempo_n, loudness_n };
}

async function loadData(token, range = 'long_term') {
  showLoading('Analyzing your taste...');
  try {
    const [profile, topTracks] = await Promise.all([
      spotifyFetch('/me', token),
      spotifyFetch(`/me/top/tracks?limit=50&time_range=${range}`, token),
    ]);
    if (profile.images?.[0]) document.getElementById('user-avatar').src = profile.images[0].url;
    document.getElementById('user-name').textContent = profile.display_name;
    const tracks = topTracks.items;
    if (!tracks.length) { showToast('No listening data for this period yet.'); hideLoading(); return; }
    const artistIds = tracks.flatMap(t => t.artists.map(a => a.id));
    const artists = await getArtistGenres(artistIds, token);
    const avg = aggregateFromTracks(tracks, artists);
    updateStats(avg, tracks.length);
    updateHistory(tracks);
    renderShape(avg);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    hideLoading();
  } catch (err) {
    console.error(err);
    hideLoading();
    showToast('Error: ' + err.message);
  }
}

let scene, camera, renderer, mesh;
let targetRotationX = 0, targetRotationY = 0;
let currentFeatures = null;

function initThree() {
  const canvas = document.getElementById('threejs-canvas');
  const wrap = document.getElementById('canvas-wrap');
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(60, wrap.clientWidth / wrap.clientHeight, 0.1, 100);
  camera.position.z = 3;
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
  scene.add(ambientLight);
  const pointLight1 = new THREE.PointLight(new THREE.Color(0xb8f06e), 2, 10);
  pointLight1.position.set(3, 3, 3);
  scene.add(pointLight1);
  const pointLight2 = new THREE.PointLight(0x4444ff, 1.5, 10);
  pointLight2.position.set(-3, -2, 2);
  scene.add(pointLight2);
  const pointLight3 = new THREE.PointLight(0xff44aa, 1, 10);
  pointLight3.position.set(0, -3, -2);
  scene.add(pointLight3);
  let isDragging = false, lastX = 0, lastY = 0;
  canvas.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
  canvas.addEventListener('mousemove', e => {
    if (!isDragging) return;
    targetRotationY += (e.clientX - lastX) * 0.01;
    targetRotationX += (e.clientY - lastY) * 0.01;
    lastX = e.clientX; lastY = e.clientY;
  });
  canvas.addEventListener('mouseup', () => isDragging = false);
  canvas.addEventListener('touchstart', e => { lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; });
  canvas.addEventListener('touchmove', e => {
    targetRotationY += (e.touches[0].clientX - lastX) * 0.01;
    targetRotationX += (e.touches[0].clientY - lastY) * 0.01;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  });
  window.addEventListener('resize', () => {
    camera.aspect = wrap.clientWidth / wrap.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(wrap.clientWidth, wrap.clientHeight);
  });
  animate();
}

function buildGeometry(features, goalFeatures = null) {
  const f = goalFeatures || features;
  const segments = Math.floor(4 + f.energy * 12);
  const spikes = Math.floor(2 + f.danceability * 8);
  const roughness = f.acousticness;
  const stretch = 0.6 + f.valence * 0.8;
  const complexity = f.instrumentalness;
  const noisePower = f.tempo_n * 0.8;
  const geo = new THREE.SphereGeometry(1, Math.max(segments, 8), Math.max(segments, 8));
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
    const len = Math.sqrt(x*x + y*y + z*z);
    const nx = x/len, ny = y/len, nz = z/len;
    const spike = Math.sin(nx*spikes*Math.PI) * Math.cos(ny*spikes*Math.PI) * Math.sin(nz*spikes*Math.PI);
    const rough = Math.sin(nx*20+nz*15) * Math.cos(ny*18) * roughness * 0.15;
    const warp = Math.sin(nx*8+ny*6) * Math.cos(nz*7) * complexity * 0.2;
    const d = 1 + spike*noisePower*0.4 + rough + warp;
    pos.setX(i, nx*d); pos.setY(i, ny*d*stretch); pos.setZ(i, nz*d);
  }
  pos.needsUpdate = true;
  geo.computeVertexNormals();
  return geo;
}

function buildMaterial(features) {
  const hue = 0.25 + features.valence * 0.15;
  const sat = 0.4 + features.energy * 0.6;
  const lit = 0.3 + features.energy * 0.3;
  const color = new THREE.Color().setHSL(hue, sat, lit);
  const emissive = new THREE.Color().setHSL(hue, sat*0.5, lit*0.2);
  return new THREE.MeshStandardMaterial({
    color, emissive,
    roughness: 0.3 + features.acousticness * 0.5,
    metalness: 0.1 + features.energy * 0.4,
  });
}

let wireframeMesh = null;

function renderShape(features, goalFeatures = null) {
  if (mesh) { scene.remove(mesh); mesh.geometry.dispose(); mesh.material.dispose(); }
  if (wireframeMesh) { scene.remove(wireframeMesh); wireframeMesh.geometry.dispose(); wireframeMesh.material.dispose(); }
  const geo = buildGeometry(features, goalFeatures);
  const mat = buildMaterial(goalFeatures || features);
  mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);
  const wireMat = new THREE.MeshBasicMaterial({ color: 0xb8f06e, wireframe: true, transparent: true, opacity: 0.06 });
  wireframeMesh = new THREE.Mesh(geo.clone(), wireMat);
  scene.add(wireframeMesh);
  currentFeatures = features;
}

function animate() {
  requestAnimationFrame(animate);
  if (mesh) {
    mesh.rotation.y += (targetRotationY - mesh.rotation.y) * 0.05;
    mesh.rotation.x += (targetRotationX - mesh.rotation.x) * 0.05;
    targetRotationY += 0.003;
    if (wireframeMesh) { wireframeMesh.rotation.y = mesh.rotation.y; wireframeMesh.rotation.x = mesh.rotation.x; }
  }
  if (renderer) renderer.render(scene, camera);
}

const GOALS = [
  { name: 'Pure Energy', desc: 'High intensity, raw drive', features: { energy:0.95, valence:0.6, danceability:0.7, acousticness:0.05, instrumentalness:0.1, speechiness:0.1, tempo_n:0.9, loudness_n:0.9 }},
  { name: 'Deep Melancholy', desc: 'Slow, dark, introspective', features: { energy:0.2, valence:0.1, danceability:0.2, acousticness:0.7, instrumentalness:0.6, speechiness:0.05, tempo_n:0.1, loudness_n:0.2 }},
  { name: 'Club Ready', desc: 'Dance-floor optimized', features: { energy:0.85, valence:0.8, danceability:0.95, acousticness:0.02, instrumentalness:0.05, speechiness:0.15, tempo_n:0.8, loudness_n:0.85 }},
  { name: 'Acoustic Soul', desc: 'Warm, organic, human', features: { energy:0.35, valence:0.55, danceability:0.4, acousticness:0.9, instrumentalness:0.2, speechiness:0.06, tempo_n:0.3, loudness_n:0.4 }},
  { name: 'Electronic Void', desc: 'Ambient, instrumental, cold', features: { energy:0.5, valence:0.3, danceability:0.45, acousticness:0.05, instrumentalness:0.95, speechiness:0.03, tempo_n:0.5, loudness_n:0.5 }},
  { name: 'Euphoric Peak', desc: 'Maximum joy and movement', features: { energy:0.9, valence:0.98, danceability:0.9, acousticness:0.03, instrumentalness:0.1, speechiness:0.1, tempo_n:0.85, loudness_n:0.88 }},
];

function renderGoalMiniCanvas(canvas, features) {
  const s = new THREE.Scene();
  const c = new THREE.PerspectiveCamera(60, 1, 0.1, 10);
  c.position.z = 2.5;
  const r = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  r.setSize(canvas.clientWidth || 160, canvas.clientHeight || 100);
  s.add(new THREE.AmbientLight(0xffffff, 0.5));
  const pl = new THREE.PointLight(0xb8f06e, 2, 10);
  pl.position.set(2, 2, 2);
  s.add(pl);
  const m = new THREE.Mesh(buildGeometry(features), buildMaterial(features));
  s.add(m);
  let rot = 0;
  (function loop() { requestAnimationFrame(loop); m.rotation.y = rot += 0.01; r.render(s, c); })();
}

function buildGoals() {
  const grid = document.getElementById('goals-grid');
  GOALS.forEach((goal, i) => {
    const card = document.createElement('div');
    card.className = 'goal-card';
    card.id = 'goal-' + i;
    card.innerHTML = `<canvas class="goal-canvas" id="goal-canvas-${i}"></canvas><div class="goal-name">${goal.name}</div><div class="goal-desc">${goal.desc}</div>`;
    card.onclick = () => selectGoal(i);
    grid.appendChild(card);
    setTimeout(() => renderGoalMiniCanvas(document.getElementById('goal-canvas-' + i), goal.features), 100 * i);
  });
}

let selectedGoal = null;
function selectGoal(i) {
  document.querySelectorAll('.goal-card').forEach(c => c.classList.remove('active'));
  if (selectedGoal === i) { selectedGoal = null; if (currentFeatures) renderShape(currentFeatures); showToast('Showing your shape'); return; }
  selectedGoal = i;
  document.getElementById('goal-' + i).classList.add('active');
  if (currentFeatures) renderShape(currentFeatures, GOALS[i].features);
  showToast('Goal: ' + GOALS[i].name + ' — explore music to get there');
}

function updateStats(features, count) {
  const pct = v => Math.round(v * 100) + '%';
  document.getElementById('stat-energy').textContent = pct(features.energy);
  document.getElementById('stat-mood').textContent = pct(features.valence);
  document.getElementById('stat-dance').textContent = pct(features.danceability);
  document.getElementById('stat-acoustic').textContent = pct(features.acousticness);
  document.getElementById('stat-tracks').textContent = count;
}

function updateHistory(tracks) {
  const list = document.getElementById('history-list');
  list.innerHTML = '';
  tracks.slice(0, 10).forEach(track => {
    const img = track.album?.images?.[2]?.url || '';
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `${img ? `<img src="${img}" alt="${track.name}" />` : ''}<div><div class="history-track">${track.name}</div><div class="history-artist">${track.artists?.map(a => a.name).join(', ')}</div></div><div class="history-bar">${[...Array(5)].map(() => `<div class="bar-seg" style="height:${6+Math.random()*14}px"></div>`).join('')}</div>`;
    list.appendChild(item);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function showLoading(text = 'Loading...') {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('loading-text').textContent = text;
}

function hideLoading() {
  document.getElementById('loading').style.display = 'none';
}

let currentToken = null;

async function switchTimeRange(range) {
  document.querySelectorAll('.controls-bar .btn:not(.btn-share)').forEach(b => b.classList.remove('active'));
  const map = { long_term: 'btn-alltime', medium_term: 'btn-6mo', short_term: 'btn-4wk' };
  document.getElementById(map[range]).classList.add('active');
  await loadData(currentToken, range);
}

function shareShape() {
  const canvas = document.getElementById('threejs-canvas');
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'my-taste-shape.png';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Shape saved — post it 🔥');
  });
}

async function boot() {
  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get('code');
  console.log('Boot — code:', code);
  if (code) {
    showLoading('Connecting to Spotify...');
    try {
      const token = await exchangeToken(code);
      console.log('Token OK');
      currentToken = token;
      initThree();
      buildGoals();
      await loadData(token);
    } catch (err) {
      console.error('Boot error:', err);
      hideLoading();
      showToast('Auth failed: ' + err.message);
    }
    return;
  }
  const token = getToken();
  if (token) {
    currentToken = token;
    initThree();
    buildGoals();
    await loadData(token);
    return;
  }
  document.getElementById('login-screen').style.display = 'flex';
}

document.getElementById('login-btn').onclick = login;
boot();

</script>
